<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent | Kundananji Simukonda</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: "Outfit", "Segoe UI", sans-serif;
        color: #e2e8f0;
        background:
          radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.25), transparent 40%),
          radial-gradient(circle at 90% 85%, rgba(56, 189, 248, 0.16), transparent 35%),
          #020617;
      }

      .card {
        width: min(680px, 100%);
        border: 1px solid #334155;
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.92);
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        font-size: clamp(1.5rem, 3vw, 2rem);
        color: #67e8f9;
      }

      p {
        margin-top: 1rem;
        line-height: 1.6;
        color: #cbd5e1;
      }

      a {
        display: inline-block;
        margin-top: 1.25rem;
        text-decoration: none;
        font-weight: 700;
        color: #67e8f9;
      }

      a:hover,
      a:focus-visible {
        color: #a5f3fc;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Message sent successfully</h1>
      <p>
        Thank you for reaching out. Your message has been received and I will respond as soon as possible.
      </p>
      <a href="/">Back to portfolio</a>
    </main>
  </body>
</html>
